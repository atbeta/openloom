name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write
  contents: read

jobs:
  quality:
    name: Quality gate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --extra ui --group dev --python ${{ matrix.python-version }} --frozen

      - name: Ruff
        run: uv run ruff check src tests

      - name: Mypy
        run: uv run mypy

      - name: Import linter
        run: uv run lint-imports

      - name: Pytest
        run: uv run pytest -q

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [quality]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Verify frontend matches committed static
        run: |
          git diff --exit-code -- src/openloom/server/static/app/ || {
            echo "::error::Frontend build diverged from committed static/app/ — run 'cd frontend && npm run build' and commit before tagging."
            exit 1
          }

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build wheel
        run: uv build

      - name: Verify wheel
        run: test -f dist/openloom-*.whl

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build]
    environment:
      name: pypi
      url: https://pypi.org/p/openloom
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  windows-exe:
    name: Build Windows exe
    runs-on: windows-latest
    needs: [quality]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync + install build deps
        run: |
          uv sync --extra ui --group dev --frozen
          uv pip install pyinstaller requests

      - name: Verify requests exists
        run: uv run python -c "import requests; print('requests', requests.__version__)"

      - name: Build exe
        run: |
          uv run pyinstaller --onefile --name openloom `
            --add-data "src/openloom/server/static;openloom/server/static" `
            --collect-all requests `
            --collect-all urllib3 `
            --collect-all certifi `
            --collect-all charset_normalizer `
            --collect-all idna `
            src/openloom/__main__.py

      - name: Test exe
        run: |
          .\dist\openloom.exe --help
          .\dist\openloom.exe --version

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/openloom.exe
